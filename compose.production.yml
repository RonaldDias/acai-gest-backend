services:
  postgres:
    image: postgres:16-alpine
    container_name: acai_gest_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - acai_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  backend:
  build:
    context: .
    dockerfile: Dockerfile
  container_name: acai_gest_backend
  restart: always
  ports:
    - "127.0.0.1:3001:3001"
  env_file:
    - .env.production
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - acai_network
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: "3"

networks:
  acai_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
